{% extends "base.html" %}
{% block title %}Sign in — Homelab Wrapped{% endblock %}
{% block body %}
<main class="index">
  <header class="index-head">
    <h1>Sign in</h1>
    <p class="tagline">Your homelab's year, on your own hardware.</p>
  </header>

  {% if error %}<p class="notice error" role="alert">{{ error }}</p>{% endif %}

  <form method="post" action="/login" class="add-form">
    <label>Username
      <input name="username" required autocomplete="username" value="{{ username or '' }}">
    </label>
    <label>Password
      <input name="password" type="password" required autocomplete="current-password">
    </label>
    <button class="btn" type="submit">Sign in</button>
  </form>
</main>
{% endblock %}
