{% extends "base.html" %}
{% block title %}{{ story.period.label }} — Homelab Wrapped{% endblock %}
{% block body %}
<div id="player" class="player">
  <div class="progress" role="tablist" aria-label="Story progress"></div>
  <main class="stage" aria-live="polite"></main>
  <div class="nav-buttons">
    <button class="nav-btn nav-prev" aria-label="Previous card">‹</button>
    <button class="nav-btn nav-next" aria-label="Next card">›</button>
  </div>
  <a class="leave" href="/" aria-label="Back to all recaps">✕</a>
</div>
<script type="application/json" id="story-data">{{ story | tojson }}</script>
<script type="module" src="/static/player.js"></script>
{% endblock %}
