# Homelab Wrapped configuration.
# In Docker this file is created for you in /data on first start — edit it,
# then run:  wrapped sync && wrapped build   (via `docker exec homelab-wrapped …`)
#
# Everything below is optional; uncomment what you use.

# Your timezone — day boundaries, streaks and heatmaps are computed in it.
# timezone: Europe/London

# Where the local event cache lives. Wipe it any time with `wrapped purge`.
database: events.db

# Web UI sign-in. "local" (default): first visit creates an admin account,
# stored as a scrypt hash in auth.json next to this file. "proxy": skip the
# sign-in page and trust the X-Auth-User header from your reverse proxy
# (Authelia, Authentik, …) — only use behind a proxy that strips that header
# from client requests.
# auth: local

# Delete cached events older than this many days on each sync.
# retention_days: 730

connectors: {}
  # Jellyfin, via the Playback Reporting plugin's database (read-only).
  # jellyfin:
  #   type: jellyfin
  #   db_path: /jellyfin-data/data/playback_reporting.db
  #   timezone: Europe/London      # zone your Jellyfin server logs in
  #   user_id: abc123              # only this user's plays
  #
  # This server, via the read-only Docker socket the compose file mounts:
  # network traffic per container + container counts. No credentials.
  # this-server:
  #   type: docker_stats
  #
  # Paperless-ngx, via its API (click your username → My Profile → API token).
  # paperless:
  #   type: paperless
  #   url: http://paperless.local:8000
  #   api_token: YOUR_PAPERLESS_TOKEN
  #
  # Pi-hole, via its FTL query database (mount /etc/pihole read-only).
  # pihole:
  #   type: pihole
  #   db_path: /pihole-data/pihole-FTL.db
  #
  # Immich, via its API (create a key in Account Settings → API Keys).
  # immich:
  #   type: immich
  #   url: http://immich.local:2283
  #   api_key: YOUR_IMMICH_API_KEY
  #
  # Anything else: export to CSV/JSON and use the generic connector.
  # Columns/keys: ts (ISO-8601), kind, entity, entity_group, value.
  # mydata:
  #   type: generic_csv
  #   path: /data/events.csv

# Scheduled jobs — with these on, the running container rebuilds recaps
# automatically (monthly on the 1st; on-this-day daily).
# schedule:
#   monthly_recap: true
#   on_this_day: true
#   hour: 6               # local hour the jobs run at

# Email digests, sent through YOUR OWN SMTP server. Omit to disable.
# email:
#   smtp_host: mail.example.com
#   smtp_port: 587
#   starttls: true
#   username: wrapped@example.com
#   password: app-password
#   from: wrapped@example.com
#   to: you@example.com
